services:
  # ====== 基础设施 ======

  mysql:
    image: mysql:8.0
    container_name: triflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-triflow123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-triflow}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-triflow123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - triflow-network

  redis:
    image: redis:7-alpine
    container_name: triflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-triflow123} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-triflow123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triflow-network

  minio:
    image: minio/minio:latest
    container_name: triflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-triflow}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-triflow123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triflow-network

  # MinIO 初始化（创建 bucket）
  minio-init:
    image: minio/mc:latest
    container_name: triflow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set triflow http://minio:9000 $${MINIO_ACCESS_KEY:-triflow} $${MINIO_SECRET_KEY:-triflow123};
      mc mb triflow/$${MINIO_BUCKET:-triflow} --ignore-existing;
      mc anonymous set download triflow/$${MINIO_BUCKET:-triflow};
      echo 'MinIO bucket initialized successfully';
      "
    networks:
      - triflow-network

  # ====== 应用服务 ======

  server:
    build:
      context: ./triflow-server
      dockerfile: Dockerfile
    container_name: triflow-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-triflow}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-triflow123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-triflow123}
      REDIS_DATABASE: ${REDIS_DATABASE:-6}
      S3_ENABLED: ${S3_ENABLED:-true}
      S3_PROVIDER: MINIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: us-east-1
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-triflow}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-triflow123}
      MINIO_BUCKET: ${MINIO_BUCKET:-triflow}
    ports:
      - "${SERVER_PORT:-7100}:7100"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - triflow-network

  web:
    build:
      context: ./triflow-web
      dockerfile: Dockerfile
    container_name: triflow-web
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${WEB_PORT:-7200}:8080"
    depends_on:
      - server
    networks:
      - triflow-network

# ====== 网络 ======
networks:
  triflow-network:
    driver: bridge

# ====== 数据卷 ======
volumes:
  mysql-data:
  redis-data:
  minio-data:
