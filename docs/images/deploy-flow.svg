<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <filter id="dfS" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="900" height="200" rx="16" fill="url(#dfBg)"/>

  <text x="450" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" letter-spacing="2">DEPLOYMENT FLOW</text>

  <!-- Step 1: Clone -->
  <g filter="url(#dfS)">
    <rect x="20" y="55" width="150" height="80" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.4)" stroke-width="1.2"/>
    <text x="95" y="82" text-anchor="middle" fill="#60a5fa" font-size="22">📥</text>
    <text x="95" y="102" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700">Git Clone</text>
    <text x="95" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">克隆仓库到本地</text>
  </g>

  <!-- Arrow -->
  <path d="M 178 95 L 208 95" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none" marker-end="url(#arrowDF)"/>
  <defs><marker id="arrowDF" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.25)"/></marker></defs>

  <!-- Step 2: Build -->
  <g filter="url(#dfS)">
    <rect x="215" y="55" width="150" height="80" rx="10" fill="rgba(245,158,11,0.1)" stroke="rgba(245,158,11,0.4)" stroke-width="1.2"/>
    <text x="290" y="82" text-anchor="middle" fill="#f59e0b" font-size="22">🔨</text>
    <text x="290" y="102" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Docker Build</text>
    <text x="290" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">自动构建三端镜像</text>
  </g>

  <path d="M 373 95 L 403 95" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none" marker-end="url(#arrowDF)"/>

  <!-- Step 3: Start -->
  <g filter="url(#dfS)">
    <rect x="410" y="55" width="150" height="80" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.4)" stroke-width="1.2"/>
    <text x="485" y="82" text-anchor="middle" fill="#22c55e" font-size="22">🚀</text>
    <text x="485" y="102" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">One-Click Start</text>
    <text x="485" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">一键启动所有服务</text>
  </g>

  <path d="M 568 95 L 598 95" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none" marker-end="url(#arrowDF)"/>

  <!-- Step 4: Access -->
  <g filter="url(#dfS)">
    <rect x="605" y="55" width="150" height="80" rx="10" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.4)" stroke-width="1.2"/>
    <text x="680" y="82" text-anchor="middle" fill="#a855f7" font-size="22">🌐</text>
    <text x="680" y="102" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="700">Access Services</text>
    <text x="680" y="120" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">访问 Web / H5 / API</text>
  </g>

  <path d="M 763 95 L 793 95" stroke="rgba(255,255,255,0.25)" stroke-width="2" fill="none" marker-end="url(#arrowDF)"/>

  <!-- Step 5: Done -->
  <g filter="url(#dfS)">
    <rect x="800" y="55" width="80" height="80" rx="10" fill="rgba(236,72,153,0.1)" stroke="rgba(236,72,153,0.4)" stroke-width="1.2"/>
    <text x="840" y="86" text-anchor="middle" fill="#ec4899" font-size="28">✅</text>
    <text x="840" y="118" text-anchor="middle" fill="#ec4899" font-size="10" font-weight="700">Ready!</text>
  </g>

  <!-- Time indicator -->
  <text x="450" y="165" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="11">首次约 5~10 分钟 · 后续秒级启动 · 支持 All-in-One 单容器 / Docker Compose 多容器</text>
  <line x1="50" y1="180" x2="850" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
