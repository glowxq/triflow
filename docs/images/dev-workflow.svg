<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dwBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <filter id="dwS" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="900" height="220" rx="16" fill="url(#dwBg)"/>

  <text x="450" y="32" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" letter-spacing="2">LOCAL DEVELOPMENT WORKFLOW</text>

  <!-- Start script -->
  <g filter="url(#dwS)">
    <rect x="30" y="55" width="160" height="90" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.4)" stroke-width="1.2"/>
    <text x="110" y="80" text-anchor="middle" fill="#22c55e" font-size="18">⚡</text>
    <text x="110" y="98" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">./start.sh</text>
    <text x="110" y="116" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">一键启动脚本</text>
    <text x="110" y="132" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="8">自动检测环境 · 编译 · 启动</text>
  </g>

  <!-- Arrow split -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none">
    <path d="M 190 80 L 240 80 Q 250 80 250 70 L 250 60 L 280 60"/>
    <path d="M 190 100 L 280 100"/>
    <path d="M 190 120 L 240 120 Q 250 120 250 130 L 250 140 L 280 140"/>
  </g>

  <!-- Server -->
  <g filter="url(#dwS)">
    <rect x="285" y="38" width="175" height="44" rx="8" fill="rgba(109,179,63,0.1)" stroke="rgba(109,179,63,0.35)" stroke-width="1"/>
    <text x="320" y="55" fill="#6DB33F" font-size="8" font-weight="600">☕ SERVER</text>
    <text x="320" y="72" fill="rgba(255,255,255,0.5)" font-size="8">mvn → java -jar</text>
    <rect x="406" y="48" width="44" height="22" rx="11" fill="rgba(109,179,63,0.2)"/>
    <text x="428" y="63" text-anchor="middle" fill="#6DB33F" font-size="9" font-weight="600">7100</text>
  </g>

  <!-- Web -->
  <g filter="url(#dwS)">
    <rect x="285" y="78" width="175" height="44" rx="8" fill="rgba(79,192,141,0.1)" stroke="rgba(79,192,141,0.35)" stroke-width="1"/>
    <text x="320" y="95" fill="#4FC08D" font-size="8" font-weight="600">🖥 WEB ADMIN</text>
    <text x="320" y="112" fill="rgba(255,255,255,0.5)" font-size="8">pnpm dev:admin</text>
    <rect x="406" y="88" width="44" height="22" rx="11" fill="rgba(79,192,141,0.2)"/>
    <text x="428" y="103" text-anchor="middle" fill="#4FC08D" font-size="9" font-weight="600">7200</text>
  </g>

  <!-- App -->
  <g filter="url(#dwS)">
    <rect x="285" y="118" width="175" height="44" rx="8" fill="rgba(43,153,57,0.1)" stroke="rgba(43,153,57,0.35)" stroke-width="1"/>
    <text x="320" y="135" fill="#2B9939" font-size="8" font-weight="600">📱 APP H5</text>
    <text x="320" y="152" fill="rgba(255,255,255,0.5)" font-size="8">pnpm dev:h5</text>
    <rect x="406" y="128" width="44" height="22" rx="11" fill="rgba(43,153,57,0.2)"/>
    <text x="428" y="143" text-anchor="middle" fill="#2B9939" font-size="9" font-weight="600">7300</text>
  </g>

  <!-- Hot Reload -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1.2" fill="none" stroke-dasharray="5,3">
    <path d="M 460 60 L 520 60"/>
    <path d="M 460 100 L 520 100"/>
    <path d="M 460 140 L 520 140"/>
  </g>

  <g filter="url(#dwS)">
    <rect x="525" y="52" width="140" height="100" rx="10" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
    <text x="595" y="80" text-anchor="middle" fill="#f59e0b" font-size="18">🔄</text>
    <text x="595" y="100" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Hot Reload</text>
    <text x="595" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">代码保存即时生效</text>
    <text x="595" y="134" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="8">Vite HMR · Spring DevTools</text>
  </g>

  <!-- Status -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1.2" fill="none" stroke-dasharray="5,3">
    <path d="M 665 100 L 720 100"/>
  </g>

  <g filter="url(#dwS)">
    <rect x="725" y="52" width="145" height="100" rx="10" fill="rgba(168,85,247,0.08)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="798" y="80" text-anchor="middle" fill="#a855f7" font-size="18">📊</text>
    <text x="798" y="100" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="700">Status Panel</text>
    <text x="798" y="118" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">start.sh status</text>
    <text x="798" y="134" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="8">日志 · 端口 · PID 管理</text>
  </g>

  <!-- Bottom hints -->
  <text x="450" y="185" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">支持选择性启动: ./start.sh server web:admin | ./start.sh server app:h5 | ./start.sh stop</text>
  <text x="450" y="203" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="9">小程序: ./start.sh app:mp → 微信开发者工具打开 dist/dev/mp-weixin</text>
</svg>
