<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="webGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC08D"/>
      <stop offset="100%" stop-color="#35a06d"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DB33F"/>
      <stop offset="100%" stop-color="#5a9a2f"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B9939"/>
      <stop offset="100%" stop-color="#1f7a2b"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="50" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" letter-spacing="2">TRIFLOW ARCHITECTURE</text>
  <text x="450" y="72" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Server · Web · App — 三端协同全栈架构</text>

  <!-- Client Layer Label -->
  <text x="30" y="115" fill="rgba(255,255,255,0.35)" font-size="10" font-weight="600" letter-spacing="3">CLIENT LAYER</text>
  <line x1="30" y1="122" x2="870" y2="122" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Web Admin Card -->
  <g filter="url(#shadow)">
    <rect x="40" y="138" width="240" height="100" rx="12" fill="rgba(79,192,141,0.12)" stroke="rgba(79,192,141,0.4)" stroke-width="1.5"/>
    <rect x="40" y="138" width="240" height="4" rx="2" fill="url(#webGrad)"/>
    <text x="72" y="170" fill="#4FC08D" font-size="11" font-weight="700">🖥 WEB ADMIN</text>
    <text x="72" y="188" fill="rgba(255,255,255,0.7)" font-size="11">Vue 3.5 + Element Plus</text>
    <text x="72" y="204" fill="rgba(255,255,255,0.5)" font-size="10">TypeScript · Vben Admin</text>
    <text x="72" y="222" fill="rgba(255,255,255,0.35)" font-size="10">端口 7200</text>
  </g>

  <!-- App H5 Card -->
  <g filter="url(#shadow)">
    <rect x="330" y="138" width="240" height="100" rx="12" fill="rgba(43,153,57,0.12)" stroke="rgba(43,153,57,0.4)" stroke-width="1.5"/>
    <rect x="330" y="138" width="240" height="4" rx="2" fill="url(#appGrad)"/>
    <text x="362" y="170" fill="#2B9939" font-size="11" font-weight="700">📱 MOBILE APP</text>
    <text x="362" y="188" fill="rgba(255,255,255,0.7)" font-size="11">UniApp + Vue 3</text>
    <text x="362" y="204" fill="rgba(255,255,255,0.5)" font-size="10">H5 · 微信小程序 · Android · iOS</text>
    <text x="362" y="222" fill="rgba(255,255,255,0.35)" font-size="10">端口 7300</text>
  </g>

  <!-- API Doc Card -->
  <g filter="url(#shadow)">
    <rect x="620" y="138" width="240" height="100" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
    <rect x="620" y="138" width="240" height="4" rx="2" fill="#f59e0b"/>
    <text x="652" y="170" fill="#f59e0b" font-size="11" font-weight="700">📄 API DOCS</text>
    <text x="652" y="188" fill="rgba(255,255,255,0.7)" font-size="11">Knife4j + OpenAPI 3.0</text>
    <text x="652" y="204" fill="rgba(255,255,255,0.5)" font-size="10">在线接口文档 · 调试工具</text>
    <text x="652" y="222" fill="rgba(255,255,255,0.35)" font-size="10">/doc.html</text>
  </g>

  <!-- Connection Lines -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none">
    <path d="M 160 238 L 160 270 Q 160 280 170 280 L 430 280 Q 440 280 440 290 L 440 300" stroke-dasharray="6,3"/>
    <path d="M 450 238 L 450 270 Q 450 280 445 280 L 445 300" stroke-dasharray="6,3"/>
    <path d="M 740 238 L 740 270 Q 740 280 730 280 L 460 280 Q 450 280 450 290 L 450 300" stroke-dasharray="6,3"/>
  </g>

  <!-- Arrow indicators -->
  <text x="300" y="275" fill="rgba(255,255,255,0.3)" font-size="10">REST API</text>

  <!-- Server Layer Label -->
  <text x="30" y="295" fill="rgba(255,255,255,0.35)" font-size="10" font-weight="600" letter-spacing="3">SERVER LAYER</text>
  <line x1="30" y1="302" x2="870" y2="302" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Server Card -->
  <g filter="url(#shadow)">
    <rect x="180" y="315" width="540" height="80" rx="12" fill="rgba(109,179,63,0.12)" stroke="rgba(109,179,63,0.4)" stroke-width="1.5"/>
    <rect x="180" y="315" width="540" height="4" rx="2" fill="url(#serverGrad)"/>
    <text x="220" y="347" fill="#6DB33F" font-size="13" font-weight="700">☕ TRIFLOW-SERVER</text>
    <text x="220" y="365" fill="rgba(255,255,255,0.7)" font-size="11">Java 25 + Spring Boot 3.5 + Spring AI</text>
    <text x="220" y="381" fill="rgba(255,255,255,0.5)" font-size="10">Sa-Token 鉴权 · MyBatis-Flex ORM · Flyway 迁移 · 端口 7100</text>

    <!-- Module badges -->
    <rect x="530" y="336" width="56" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="558" y="350" text-anchor="middle" fill="#6DB33F" font-size="9">权限</text>
    <rect x="592" y="336" width="42" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="613" y="350" text-anchor="middle" fill="#6DB33F" font-size="9">AI</text>
    <rect x="640" y="336" width="56" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="668" y="350" text-anchor="middle" fill="#6DB33F" font-size="9">文件</text>
    <rect x="530" y="362" width="56" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="558" y="376" text-anchor="middle" fill="#6DB33F" font-size="9">微信</text>
    <rect x="592" y="362" width="56" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="620" y="376" text-anchor="middle" fill="#6DB33F" font-size="9">钱包</text>
    <rect x="654" y="362" width="42" height="20" rx="10" fill="rgba(109,179,63,0.25)"/>
    <text x="675" y="376" text-anchor="middle" fill="#6DB33F" font-size="9">CMS</text>
  </g>

  <!-- Connection to Data Layer -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none">
    <path d="M 330 395 L 330 425 Q 330 435 320 435 L 190 435 Q 180 435 180 445 L 180 450" stroke-dasharray="6,3"/>
    <path d="M 450 395 L 450 450" stroke-dasharray="6,3"/>
    <path d="M 570 395 L 570 425 Q 570 435 580 435 L 710 435 Q 720 435 720 445 L 720 450" stroke-dasharray="6,3"/>
  </g>

  <!-- Data Layer Label -->
  <text x="30" y="445" fill="rgba(255,255,255,0.35)" font-size="10" font-weight="600" letter-spacing="3">DATA LAYER</text>
  <line x1="30" y1="452" x2="870" y2="452" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- MySQL -->
  <g filter="url(#shadow)">
    <rect x="90" y="462" width="180" height="44" rx="10" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <text x="130" y="489" fill="#3b82f6" font-size="12" font-weight="600">🐬 MySQL 8.0</text>
  </g>

  <!-- Redis -->
  <g filter="url(#shadow)">
    <rect x="360" y="462" width="180" height="44" rx="10" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
    <text x="403" y="489" fill="#ef4444" font-size="12" font-weight="600">⚡ Redis 7.0</text>
  </g>

  <!-- MinIO -->
  <g filter="url(#shadow)">
    <rect x="630" y="462" width="180" height="44" rx="10" fill="rgba(236,72,153,0.12)" stroke="rgba(236,72,153,0.4)" stroke-width="1.5"/>
    <text x="672" y="489" fill="#ec4899" font-size="12" font-weight="600">📦 MinIO S3</text>
  </g>
</svg>
