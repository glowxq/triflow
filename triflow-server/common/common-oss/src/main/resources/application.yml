# OSS 配置示例
# 请根据实际环境配置以下参数

oss:
  # 是否启用 OSS 模块
  enabled: true

  # 服务提供商：AWS, ALIYUN, TENCENT, QINIU, MINIO, HUAWEI
  provider: MINIO

  # S3 兼容服务端点
  # AWS: s3.amazonaws.com 或 s3.{region}.amazonaws.com
  # 阿里云: oss-{region}.aliyuncs.com
  # 腾讯云: cos.{region}.myqcloud.com
  # MinIO: your-minio-server:9000
  endpoint: localhost:9000

  # 区域（某些提供商需要）
  region: us-east-1

  # 访问密钥
  access-key: your-access-key
  secret-key: your-secret-key

  # 默认存储桶名称
  bucket-name: default-bucket

  # 自定义域名（CDN 加速等，可选）
  # domain: https://cdn.example.com

  # 是否使用 HTTPS
  use-https: false

  # 文件命名策略：UUID, ORIGINAL, ORIGINAL_WITH_TIMESTAMP
  naming-strategy: UUID

  # 预签名 URL 默认有效期（分钟）
  presigned-url-expire-minutes: 10

  # STS 临时凭证配置（用于 STS 直传）
  # sts-role-arn: arn:aws:iam::123456789012:role/S3UploadRole
  # sts-role-session-name: oss-upload-session
  # sts-token-duration-seconds: 3600
