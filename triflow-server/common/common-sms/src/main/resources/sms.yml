# SMS4J 短信配置示例
# 详细文档：https://sms4j.com/doc/

sms:
  # 配置来源：yaml（默认）、database、redis
  config-type: yaml

  # 短信渠道配置
  blends:
    # 配置标识（configId），可自定义，用于多渠道切换
    # 使用示例：smsTemplate.sendCode("aliyun-verify", "13800138000", "123456")
    aliyun-verify:
      # 厂商标识：alibaba（阿里云）
      supplier: alibaba
      # AccessKey ID
      access-key-id: ${aliyun.access-key-id:your-access-key-id}
      # AccessKey Secret
      access-key-secret: ${aliyun.access-key-secret:your-access-key-secret}
      # 短信签名
      signature: 您的签名
      # 默认模板ID（可选，使用 sendMessage 快速发送时需要）
      template-id: SMS_123456789
      # 请求连接超时（毫秒）
      connect-timeout: 3000
      # 服务名称（可选）
      template-name: 验证码

    # 腾讯云短信配置示例
    tencent-notify:
      # 厂商标识：tencent（腾讯云）
      supplier: tencent
      # SecretId
      access-key-id: ${tencent.secret-id:your-secret-id}
      # SecretKey
      access-key-secret: ${tencent.secret-key:your-secret-key}
      # 短信签名
      signature: 您的签名
      # 默认模板ID
      template-id: 123456
      # SDK AppId
      sdk-app-id: ${tencent.sdk-app-id:your-sdk-app-id}
      # 地域（可选）
      # region: ap-guangzhou

    # 华为云短信配置示例
    # huawei-marketing:
    #   supplier: huawei
    #   access-key-id: your-app-key
    #   access-key-secret: your-app-secret
    #   signature: 您的签名
    #   template-id: template-id
    #   sender: sender-id
    #   url: https://smsapi.cn-north-4.myhuaweicloud.com:443

    # 云片短信配置示例
    # yunpian-verify:
    #   supplier: yunpian
    #   access-key-id: your-api-key
    #   signature: 【您的签名】

  # 代理配置（可选）
  # proxy:
  #   enable: false
  #   host: 127.0.0.1
  #   port: 8080

  # 限流配置（可选）
  # restricted:
  #   enable: false
  #   # 同一账号每分钟最大发送次数
  #   minute-max: 1
  #   # 同一账号每天最大发送次数
  #   day-max: 10
  #   # 账号限流缓存时间（小时）
  #   account-cache-time: 24
