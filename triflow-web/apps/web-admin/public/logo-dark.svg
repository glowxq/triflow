<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 主渐变 - 暗色主题更亮的科技蓝 -->
    <linearGradient id="mainGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00EEFF;stop-opacity:1">
        <animate attributeName="stop-color" values="#00EEFF;#00BBFF;#00EEFF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:1">
        <animate attributeName="stop-color" values="#0088FF;#00EEFF;#0088FF" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- 发光效果 - 增强版 -->
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柔和发光 - 增强版 -->
    <filter id="softGlowDark" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景光晕 - 更明显 -->
  <circle cx="256" cy="240" r="200" fill="url(#mainGradientDark)" opacity="0.12">
    <animate attributeName="r" values="195;205;195" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- 核心三角形框架 - 代表 Tri -->
  <g filter="url(#glowDark)">
    <polygon
      points="256,100 400,320 112,320"
      fill="none"
      stroke="url(#mainGradientDark)"
      stroke-width="3"
      stroke-linejoin="round"
      opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="0 256 240;2 256 240;0 256 240;-2 256 240;0 256 240"
        dur="6s"
        repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- 三条流动曲线 - 代表 Flow -->
  <path
    d="M256 130 Q340 180, 370 290"
    stroke="#00EEFF"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
    filter="url(#softGlowDark)"
    opacity="0.95">
    <animate attributeName="stroke-dasharray" values="0,500;200,300;0,500" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <path
    d="M370 290 Q256 360, 142 290"
    stroke="#00CCFF"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
    filter="url(#softGlowDark)"
    opacity="0.95">
    <animate attributeName="stroke-dasharray" values="0,500;200,300;0,500" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  </path>

  <path
    d="M142 290 Q170 180, 256 130"
    stroke="#00AAFF"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
    filter="url(#softGlowDark)"
    opacity="0.95">
    <animate attributeName="stroke-dasharray" values="0,500;200,300;0,500" dur="2.5s" repeatCount="indefinite" begin="1.6s"/>
  </path>

  <!-- ============================================ -->
  <!-- 顶部节点 - Server (电脑/服务器) -->
  <!-- ============================================ -->
  <g filter="url(#glowDark)">
    <circle cx="256" cy="120" r="32" fill="url(#mainGradientDark)">
      <animate attributeName="r" values="30;34;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="120" r="24" fill="#0a1628">
      <animate attributeName="r" values="22;26;22" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- 服务器/电脑图标 - 显示器样式 -->
    <g>
      <!-- 显示器屏幕 -->
      <rect x="244" y="108" width="24" height="16" rx="2" fill="none" stroke="#00EEFF" stroke-width="2"/>
      <!-- 屏幕内容线条 -->
      <line x1="248" y1="113" x2="264" y2="113" stroke="#00CCFF" stroke-width="1.5" opacity="0.9"/>
      <line x1="248" y1="117" x2="260" y2="117" stroke="#00AAFF" stroke-width="1.5" opacity="0.7"/>
      <!-- 显示器支架 -->
      <line x1="256" y1="124" x2="256" y2="128" stroke="#00EEFF" stroke-width="2"/>
      <!-- 底座 -->
      <line x1="250" y1="128" x2="262" y2="128" stroke="#00EEFF" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- 右下节点 - Web (浏览器) -->
  <!-- ============================================ -->
  <g filter="url(#glowDark)">
    <circle cx="380" cy="300" r="32" fill="url(#mainGradientDark)">
      <animate attributeName="r" values="30;34;30" dur="2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="380" cy="300" r="24" fill="#0a1628">
      <animate attributeName="r" values="22;26;22" dur="2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <!-- 浏览器窗口图标 -->
    <g>
      <!-- 浏览器外框 -->
      <rect x="366" y="288" width="28" height="22" rx="3" fill="none" stroke="#00EEFF" stroke-width="2"/>
      <!-- 标签栏/地址栏 -->
      <line x1="366" y1="295" x2="394" y2="295" stroke="#00EEFF" stroke-width="1.5"/>
      <!-- 标签栏小圆点（关闭/最小化/最大化按钮） -->
      <circle cx="371" cy="291.5" r="1.5" fill="#FF6B6B"/>
      <circle cx="376" cy="291.5" r="1.5" fill="#FFE66D"/>
      <circle cx="381" cy="291.5" r="1.5" fill="#4ECB71"/>
      <!-- 网页内容区域线条 -->
      <line x1="370" y1="300" x2="390" y2="300" stroke="#00CCFF" stroke-width="1.5" opacity="0.8"/>
      <line x1="370" y1="304" x2="386" y2="304" stroke="#00AAFF" stroke-width="1.5" opacity="0.6"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- 左下节点 - App (手机) -->
  <!-- ============================================ -->
  <g filter="url(#glowDark)">
    <circle cx="132" cy="300" r="32" fill="url(#mainGradientDark)">
      <animate attributeName="r" values="30;34;30" dur="2s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <circle cx="132" cy="300" r="24" fill="#0a1628">
      <animate attributeName="r" values="22;26;22" dur="2s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <!-- 手机图标 -->
    <g>
      <!-- 手机外框 -->
      <rect x="123" y="286" width="18" height="28" rx="3" fill="none" stroke="#00EEFF" stroke-width="2"/>
      <!-- 顶部听筒 -->
      <line x1="129" y1="290" x2="135" y2="290" stroke="#00CCFF" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 屏幕区域 -->
      <rect x="126" y="293" width="12" height="14" rx="1" fill="none" stroke="#00CCFF" stroke-width="1" opacity="0.7"/>
      <!-- 底部 Home 键 -->
      <circle cx="132" cy="310" r="2" fill="#00EEFF"/>
    </g>
  </g>

  <!-- 中心核心 - 数据汇聚点 -->
  <g filter="url(#glowDark)">
    <circle cx="256" cy="240" r="20" fill="url(#mainGradientDark)" opacity="0.4">
      <animate attributeName="r" values="18;24;18" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="240" r="8" fill="#00EEFF">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 数据流粒子效果 -->
  <circle r="4" fill="#00EEFF" filter="url(#softGlowDark)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M256 130 Q300 200, 256 240 Q340 270, 370 290"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle r="4" fill="#00CCFF" filter="url(#softGlowDark)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="0.7s" path="M370 290 Q310 320, 256 240 Q200 320, 142 290"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="0.7s"/>
  </circle>

  <circle r="4" fill="#00AAFF" filter="url(#softGlowDark)">
    <animateMotion dur="2s" repeatCount="indefinite" begin="1.4s" path="M142 290 Q200 270, 256 240 Q220 180, 256 130"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin="1.4s"/>
  </circle>

  <!-- 外圈装饰 - 科技感环形 -->
  <circle cx="256" cy="240" r="180" fill="none" stroke="url(#mainGradientDark)" stroke-width="1" opacity="0.25" stroke-dasharray="10,20">
    <animateTransform attributeName="transform" type="rotate" values="0 256 240;360 256 240" dur="60s" repeatCount="indefinite"/>
  </circle>

  <circle cx="256" cy="240" r="160" fill="none" stroke="url(#mainGradientDark)" stroke-width="1" opacity="0.2" stroke-dasharray="5,15">
    <animateTransform attributeName="transform" type="rotate" values="360 256 240;0 256 240" dur="45s" repeatCount="indefinite"/>
  </circle>
</svg>
